# Maestro E2E: Epic 2 – Route planning (US-2.1, US-2.3, US-2.4) + outdoor shortest-path (US-5.2 via Google Routes)
# Run: maestro test .maestro/flows/epic2-route-planning.yaml
# Requires: Dev build installed on simulator/emulator
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

# --- US-2.1: Select start and destination building (same campus) ---
- tapOn:
    id: "fab-toggle-route-search"
- extendedWaitUntil:
    visible:
      id: "search-origin-building"
    timeout: 15000
- assertVisible:
    id: "search-destination-building"

- tapOn:
    id: "search-origin-building"
- inputText: "EV"
- assertVisible:
    id: "suggestion-EV"
- tapOn:
    id: "suggestion-EV"

- tapOn:
    id: "search-destination-building"
- inputText: "Hall"
- extendedWaitUntil:
    visible:
      id: "suggestion-H"
    timeout: 15000
- tapOn:
    id: "suggestion-H"

- extendedWaitUntil:
    visible:
      id: "Clear route"
    timeout: 15000

- tapOn:
    id: "Clear route"

# --- US-2.3 / US-2.4: Cross-campus (SGW → Loyola) ---
- tapOn:
    id: "search-origin-building"
- inputText: "EV"
- extendedWaitUntil:
    visible:
      id: "suggestion-EV"
    timeout: 15000
- tapOn:
    id: "suggestion-EV"

- tapOn:
    id: "search-destination-building"
- inputText: "Central"
- extendedWaitUntil:
    visible:
      id: "suggestion-CC"
    timeout: 15000
- tapOn:
    id: "suggestion-CC"

- extendedWaitUntil:
    visible:
      id: "Clear route"
    timeout: 15000
