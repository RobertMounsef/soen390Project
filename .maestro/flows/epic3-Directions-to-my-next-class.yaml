# Maestro E2E: Epic 3 – Calendar Integration & Auto Directions
# Covers: US-3.1, US-3.2, US-3.3, US-3.4
# Run: maestro test .maestro/flows/epic3-calendar.yaml
# Requires: Android emulator or device running the app

appId: com.debuggingdemons.campusguide
---
- launchApp

# Open calendar modal
- extendedWaitUntil:
    visible:
      id: "Open calendar connection"
    timeout: 15000

- tapOn:
    id: "Open calendar connection"

- extendedWaitUntil:
    visible:
      id: "calendar-connection-modal"
    timeout: 10000

- assertVisible:
    id: "calendar-modal-card"

- takeScreenshot: "01-calendar-modal-open"

# US-3.1: Connect Google Calendar
- extendedWaitUntil:
    visible:
      id: "calendar-connect"
    timeout: 15000

- tapOn:
    id: "calendar-connect"

- extendedWaitUntil:
    visible:
      id: "calendar-disconnect"
    timeout: 20000

- takeScreenshot: "02-calendar-connected"

# US-3.2: Calendar selection
- assertVisible:
    id: "reload-calendars"

- tapOn:
    id: "reload-calendars"

- takeScreenshot: "03-calendars-reloaded"

- tapOn: "SCHOOL_CALENDAR_NAME"
- takeScreenshot: "04-school-calendar-selected"

- tapOn: "PERSONAL_CALENDAR_NAME"
- takeScreenshot: "05-personal-calendar-selected"

# US-3.3: Next class + mapping
- extendedWaitUntil:
    visible:
      id: "go-to-class-button"
    timeout: 15000

- tapOn:
    id: "go-to-class-button"

- takeScreenshot: "06-go-to-class"

# US-3.4: Auto directions

- extendedWaitUntil:
    visible:
      id: "Toggle search route"
    timeout: 15000

- takeScreenshot: "07-after-directions"
