# Maestro E2E: Epic 3 – Calendar Integration & Auto Directions
# Covers: US-3.1, US-3.2, US-3.3, US-3.4
# Run: maestro test .maestro/flows/epic3-Directions-to-my-next-class.yaml
# Requires: Android emulator or device running the app
# Note: US-3.2–3.4 require an authenticated Google account; these steps verify
#       the UI state rather than completing the OAuth flow in CI.

appId: com.debuggingdemons.campusguide
---
- launchApp

# US-3.1: Connect Google Calendar
# The calendar FAB (connect-google-button) must be visible on the main screen

- extendedWaitUntil:
    visible:
      id: "connect-google-button"
    timeout: 15000

- tapOn:
    id: "connect-google-button"

# Calendar connection modal must open
- extendedWaitUntil:
    visible:
      id: "calendar-connection-modal"
    timeout: 15000

# Modal card and connect button are present
- assertVisible:
    id: "calendar-modal-card"

- assertVisible:
    id: "calendar-connect"

# US-3.2: Calendar selection UI
# The connect button leads to the OAuth flow; verify it is tappable
- assertVisible:
    id: "calendar-connect"

# US-3.3 & US-3.4: Next class and auto directions
# These steps require a connected Google account. Verify the modal
# structure is correct and the close button dismisses it cleanly.
- tapOn:
    id: "calendar-modal-close"

# Modal is dismissed and the FAB is accessible again
- extendedWaitUntil:
    visible:
      id: "connect-google-button"
    timeout: 10000
