# Maestro E2E: Epic 5 – Indoor Navigation & Accessibility
# Covers: US-5.1, US-5.2, US-5.3, US-5.4, US-5.5
# Run: maestro test .maestro/flows/epic5-indoor-directions.yaml
# Requires: Android emulator or device running the app

appId: com.debuggingdemons.campusguide
---

# US-5.1: Locate rooms (start or destination points)

- launchApp:
    clearState: true

# The indoor map FAB must be visible on the main screen
- extendedWaitUntil:
    visible:
      id: "indoor-map-button"
    timeout: 15000

# Open indoor map feature
- tapOn:
    id: "indoor-map-button"

# Indoor map viewer opens – origin picker button is the anchor element
- extendedWaitUntil:
    visible:
      id: "pick-origin-btn"
    timeout: 15000

# Select Hall building
- tapOn:
    id: "building-chip-H"

# Select floor 9
- tapOn:
    id: "floor-chip-9"

# Verify indoor map image is shown
- assertVisible:
    id: "indoor-map-image"

# Select start room (origin)
- tapOn:
    id: "pick-origin-btn"

# Filter picker to floor 9 and pick a room
- tapOn:
    id: "picker-floor-9"

- tapOn:
    id: "room-option-Hall_F9_room_202"

# Select destination room
- tapOn:
    id: "pick-destination-btn"

- tapOn:
    id: "picker-floor-9"

- tapOn:
    id: "room-option-Hall_F9_room_203"

# Verify selected rooms appear as markers on the map
- assertVisible:
    id: "indoor-origin-marker"

- assertVisible:
    id: "indoor-dest-marker"


# US-5.2: Show shortest path directions

- extendedWaitUntil:
    visible:
      id: "indoor-path-line"
    timeout: 10000

- assertVisible:
    id: "directions-panel-toggle"


# US-5.3: Show directions for students with disabilities

- tapOn:
    id: "accessible-only-toggle"

# Route recalculates in accessible-only mode
- extendedWaitUntil:
    visible:
      id: "indoor-path-line"
    timeout: 10000

# Disable accessible-only mode
- tapOn:
    id: "accessible-only-toggle"


# US-5.4: Indoor POI markers (washrooms, elevators, stairs) are always
#          rendered on the floor plan – verify the map image is still shown

- assertVisible:
    id: "indoor-map-image"


# US-5.5: Show directions between rooms on different floors

# Clear the current same-floor route
- extendedWaitUntil:
    visible:
      id: "indoor-clear-route"
    timeout: 10000

- tapOn:
    id: "indoor-clear-route"

# Pick a floor-9 room as origin
- tapOn:
    id: "pick-origin-btn"

- tapOn:
    id: "picker-floor-9"

- tapOn:
    id: "room-option-Hall_F9_room_202"

# Pick a floor-8 room as destination
- tapOn:
    id: "pick-destination-btn"

- tapOn:
    id: "picker-floor-8"

- tapOn:
    id: "room-option-Hall_F8_room_291"

# Multi-floor route activates the floor-switcher bar
- extendedWaitUntil:
    visible:
      id: "floor-switcher-bar"
    timeout: 10000

# Verify floor switching controls are present
- assertVisible:
    id: "floor-switch-btn-9"

- assertVisible:
    id: "floor-switch-btn-8"

# Tap through each floor to verify the map updates
- tapOn:
    id: "floor-switch-btn-8"

- tapOn:
    id: "floor-switch-btn-9"

# Close indoor maps
- tapOn:
    id: "indoor-close-btn"
