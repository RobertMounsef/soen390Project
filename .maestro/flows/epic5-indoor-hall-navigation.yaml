# Maestro E2E: Epic 5 – Indoor navigation on Hall / H (US-5.1, US-5.2, US-5.3, US-5.4, US-5.5)
# Run: maestro test .maestro/flows/epic5-indoor-hall-navigation.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

- tapOn:
    id: "lookup-building-search"
- inputText: "Hall"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "suggestion-H"
    timeout: 10000
- tapOn:
    id: "suggestion-H"
- extendedWaitUntil:
    visible:
      id: "building-info-popup"
    timeout: 8000
- tapOn:
    id: "view-floor-plans-btn"
- extendedWaitUntil:
    visible:
      id: "indoor-navigation-root"
    timeout: 20000
- extendedWaitUntil:
    visible:
      id: "pick-origin-btn"
    timeout: 15000

- assertVisible:
    id: "facility-icon-Hall_F1_elevator_door_1"

- tapOn:
    id: "floor-chip-8"
- tapOn:
    id: "pick-destination-btn"
- tapOn:
    id: "picker-floor-8"
- scrollUntilVisible:
    element:
      id: "room-option-Hall_F8_room_291"
    direction: DOWN
- tapOn:
    id: "room-option-Hall_F8_room_291"

- tapOn:
    id: "pick-origin-btn"
- tapOn:
    id: "picker-floor-1"
- scrollUntilVisible:
    element:
      id: "room-option-Hall_F1_room_44"
    direction: DOWN
- tapOn:
    id: "room-option-Hall_F1_room_44"

- extendedWaitUntil:
    visible:
      id: "indoor-path-line"
    timeout: 25000

- assertVisible:
    id: "floor-change-step-8"
    optional: true

- tapOn:
    id: "accessible-only-toggle"
- extendedWaitUntil:
    visible:
      id: "indoor-path-line"
    timeout: 25000

- tapOn:
    id: "indoor-map-close"
