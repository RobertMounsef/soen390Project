# Maestro E2E: Epic 6 – US-6.1 Nearest outdoor POIs (count / range)
# Run: maestro test .maestro/flows/epic6-outdoor-poi-nearest.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

# Enable simulated Concordia coordinates (required for reliable POI proximity in CI / simulator)
- extendedWaitUntil:
    visible:
      id: "simOffButton"
    timeout: 15000
- tapOn:
    id: "simOffButton"

- tapOn:
    id: "fab-current-location"

# 1. Open the "Nearby" collapsed pill to expand the POI panel
- tapOn:
    id: "toggle-poi-filters"

# 2. Switch to range mode and select 250 m
- tapOn:
    id: "poi-mode-range"
- tapOn:
    id: "poi-option-range-250"

# 3. Wait for the list to populate, then tap the first POI
- extendedWaitUntil:
    visible:
      id: "nearby-poi-first"
    timeout: 20000
- tapOn:
    id: "nearby-poi-first"
