# Maestro E2E: Epic 1 – Campus maps and buildings (US-1.1 through US-1.5)
# Covers: both campus maps (1.1), building shapes on map (1.2), campus switch (1.3),
#         current-location feature (1.4), building info popup (1.5)
# Run: maestro test .maestro/flows/epic1-campus-maps-and-buildings.yaml
# Requires: iOS Simulator or Android emulator + dev build (not Expo Go)
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000
- assertVisible:
    id: "campus-tab-SGW"
- assertVisible:
    id: "campus-tab-LOYOLA"

# --- US-1.2: Building shapes on map (map view visible) ---
- assertVisible:
    id: "map-view"

# --- US-1.3: Switch between campuses (toggle) ---
- tapOn:
    id: "campus-tab-LOYOLA"
- assertVisible:
    id: "campus-tab-LOYOLA"
- tapOn:
    id: "campus-tab-SGW"
- assertVisible:
    id: "campus-tab-SGW"

# --- US-1.4: Current-location FAB (no spaces in testID — Android-safe) ---
- assertVisible:
    id: "fab-current-location"

# --- US-1.5: Building info via route search → Hall (H) ---
- tapOn:
    id: "fab-toggle-route-search"
- extendedWaitUntil:
    visible:
      id: "search-origin-building"
    timeout: 15000
- tapOn:
    id: "search-origin-building"
- inputText: "Hall"
- extendedWaitUntil:
    visible:
      id: "suggestion-H"
    timeout: 5000
- tapOn:
    id: "suggestion-H"
