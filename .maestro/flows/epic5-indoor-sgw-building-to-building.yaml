# Maestro E2E: Epic 5 – US-5.6 Same-campus SGW (MB → Hall)
# Run: maestro test .maestro/flows/epic5-indoor-sgw-building-to-building.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

- tapOn:
    id: "lookup-building-search"
- inputText: "Molson"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "suggestion-MB"
    timeout: 10000
- tapOn:
    id: "suggestion-MB"
- extendedWaitUntil:
    visible:
      id: "building-info-popup"
    timeout: 8000
- tapOn:
    id: "view-floor-plans-btn"
- waitForAnimationToEnd

# Select origin: MB floor 1 – second room in the "All" list (first with clean label)
- tapOn:
    id: "pick-origin-btn"
- tapOn:
    id: "picker-floor-1"
- tapOn:
    id: "room-option-MB_F1_room_1.115"

# Switch destination building to Hall
- tapOn:
    id: "building-chip-H"

# Select destination: Hall floor 8 – first room visible when filtered to F8
- tapOn:
    id: "pick-destination-btn"
- tapOn:
    id: "picker-floor-8"
- tapOn:
    id: "room-option-Hall_F8_room_329"

- extendedWaitUntil:
    visible:
      id: "indoor-path-line"
    timeout: 30000

- tapOn:
    id: "indoor-map-close"
