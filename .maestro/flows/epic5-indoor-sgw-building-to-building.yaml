# Maestro E2E: Epic 5 – US-5.6 Same-campus SGW (MB → Hall)
# Run: maestro test .maestro/flows/epic5-indoor-sgw-building-to-building.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

- tapOn:
    id: "lookup-building-search"
- inputText: "Molson"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "suggestion-MB"
    timeout: 10000
- tapOn:
    id: "suggestion-MB"
- extendedWaitUntil:
    visible:
      id: "building-info-popup"
    timeout: 8000
- tapOn:
    id: "view-floor-plans-btn"
- extendedWaitUntil:
    visible:
      id: "indoor-navigation-header-title"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "pick-origin-btn"
    timeout: 15000

- tapOn:
    id: "pick-origin-btn"
- tapOn:
    id: "room-option-MB_F1_room_1.210"

- tapOn:
    id: "building-chip-H"

- tapOn:
    id: "pick-destination-btn"
- scrollUntilVisible:
    element:
      id: "room-option-Hall_F8_room_291"
    direction: DOWN
- tapOn:
    id: "room-option-Hall_F8_room_291"

- extendedWaitUntil:
    visible:
      id: "indoor-path-line"
    timeout: 30000

- tapOn:
    id: "indoor-map-close"
