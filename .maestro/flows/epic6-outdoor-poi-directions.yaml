# Maestro E2E: Epic 6 - Outdoor POI directions
# Route to a nearby outdoor POI using the Nearby overlay.
appId: com.debuggingdemons.campusguide
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

- tapOn:
    id: "Current Location"

- tapOn:
    id: "toggle-poi-filters"

- extendedWaitUntil:
    visible:
      id: "nearby-poi-item-lbee-lb-sgw"
    timeout: 10000

- tapOn:
    id: "nearby-poi-item-lbee-lb-sgw"

- extendedWaitUntil:
    visible:
      id: "Clear route"
    timeout: 20000
