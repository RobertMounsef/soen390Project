# Maestro E2E: Epic 6 - US-6.2 Outdoor POI directions
# Route to a seeded nearby POI from the map overlay.
# Requires: iOS Simulator with location set near Concordia (see README E2E section).
# Run: maestro test .maestro/flows/epic6-outdoor-poi-directions.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

# Center map on simulated user location so nearby POIs can be ranked.
- tapOn:
    id: "Current Location"

# Use the nearby overlay instead of tapping a raw map marker, which is less stable in CI.
- tapOn:
    id: "toggle-poi-filters"
- extendedWaitUntil:
    visible:
      id: "nearby-poi-item-node-6005200875"
    timeout: 15000
- tapOn:
    id: "nearby-poi-item-node-6005200875"

# Directions panel should appear once routing succeeds.
- extendedWaitUntil:
    visible:
      id: "Clear route"
    timeout: 20000
