# Maestro E2E: Epic 6 – US-6.2 Outdoor POI directions
# Tap an outdoor POI; origin should be current location; route UI appears.
# Requires: iOS Simulator with location set near Concordia (see README E2E section).
# Run: maestro test .maestro/flows/epic6-outdoor-poi-directions.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

# First launch may show the system location prompt (CI pre-grants via simctl; local runs may still see it).
- runFlow:
    when:
      visible:
        text: "Allow While Using the App"
    commands:
      - tapOn: "Allow While Using the App"
- runFlow:
    when:
      visible:
        text: "Allow Once"
    commands:
      - tapOn: "Allow Once"

# Wait until GPS has produced a banner (not stuck on "Finding your location...").
- extendedWaitUntil:
    visible:
      text: "You are"
    timeout: 60000

# Search starts closed; directions need origin coords. Set origin explicitly so we do not
# tap the POI before GPS is ready (FAB "Current Location" only recenters the map).
- tapOn:
    id: "Toggle search route"
- extendedWaitUntil:
    visible:
      id: "use-current-location-origin"
    timeout: 15000
- tapOn:
    id: "use-current-location-origin"

# Zoom to user so outdoor POI pins render (MapView only draws POIs when zoomed in).
- tapOn:
    id: "Current Location"
- extendedWaitUntil:
    visible:
      id: "outdoor-poi-lbee-lb-sgw"
    timeout: 25000

# Tap LBEE Café (LB building, SGW) — testID from MapView
- tapOn:
    id: "outdoor-poi-lbee-lb-sgw"

# Directions panel: Google Routes round trip
- extendedWaitUntil:
    visible:
      id: "Clear route"
    timeout: 35000
