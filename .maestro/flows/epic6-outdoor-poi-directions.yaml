# Maestro E2E: Epic 6 – US-6.2 Directions to a selected outdoor POI
# Requires: Simulator location near Concordia SGW (see README E2E).
# Run: maestro test .maestro/flows/epic6-outdoor-poi-directions.yaml
appId: com.debuggingdemons.campusguide
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "campus-tab-SGW"
    timeout: 15000

# Enable simulated Concordia coordinates (required for reliable POI proximity in CI / simulator)
- extendedWaitUntil:
    visible:
      id: "simOffButton"
    timeout: 15000
- tapOn:
    id: "simOffButton"

- tapOn:
    id: "fab-current-location"

- tapOn:
    id: "toggle-poi-filters"
- extendedWaitUntil:
    visible:
      id: "nearby-poi-item-node-6005200875"
    timeout: 15000
- tapOn:
    id: "nearby-poi-item-node-6005200875"

- extendedWaitUntil:
    visible:
      id: "Clear route"
    timeout: 20000
